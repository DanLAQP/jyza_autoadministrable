version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cifaa_mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: cifaa
      MYSQL_USER: cifaa_user
      MYSQL_PASSWORD: cifaa_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - cifaa_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cifaa_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpass
      UPLOAD_LIMIT: 64M
    depends_on:
      - mysql
    networks:
      - cifaa_network

volumes:
  mysql_data:
    driver: local

networks:
  cifaa_network:
    driver: bridge
